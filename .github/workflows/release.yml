name: Release

# Triggered by pushing a version tag: git tag v1.2.3 && git push --tags
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub release

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── Source ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Toolchains ──────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust (stable, with ARM64 + x64 targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc,x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            src-tauri/shell-ext

      - name: Install npm dependencies
        run: npm ci

      # ── MSVC path detection ─────────────────────────────────────────────────
      # The .cargo/config.toml files have dev-machine linker paths hardcoded.
      # We override them via CARGO_TARGET_* env vars so CI can use whatever
      # VS version is installed on the runner.
      - name: Detect MSVC and set Cargo linker overrides
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstall = & $vswhere -latest -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath
          $msvcVer = Get-ChildItem "$vsInstall\VC\Tools\MSVC" |
            Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty Name
          $msvc = "$vsInstall\VC\Tools\MSVC\$msvcVer"

          $wdkVer = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\Lib" |
            Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty Name
          $wdk = "${env:ProgramFiles(x86)}\Windows Kits\10\Lib\$wdkVer"

          Write-Host "MSVC: $msvc"
          Write-Host "WDK:  $wdk"

          # Linkers — Hostx64 variants for both native x64 and cross to ARM64.
          $linkerX64   = "$msvc\bin\Hostx64\x64\link.exe"
          $linkerArm64 = "$msvc\bin\Hostx64\arm64\link.exe"

          # Rustflags override — replaces the hardcoded LIBPATH entries in config.toml.
          $rfX64   = "-C link-arg=/LIBPATH:$msvc\lib\x64 -C link-arg=/LIBPATH:$wdk\ucrt\x64 -C link-arg=/LIBPATH:$wdk\um\x64"
          $rfArm64 = "-C link-arg=/LIBPATH:$msvc\lib\arm64 -C link-arg=/LIBPATH:$wdk\ucrt\arm64 -C link-arg=/LIBPATH:$wdk\um\arm64"

          # LIB vars for the shell-ext build (build.ps1 sets $env:LIB before cargo).
          $libX64   = "$msvc\lib\x64;$wdk\ucrt\x64;$wdk\um\x64"
          $libArm64 = "$msvc\lib\arm64;$wdk\ucrt\arm64;$wdk\um\arm64"

          "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=$linkerX64"     >> $env:GITHUB_ENV
          "CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_LINKER=$linkerArm64"  >> $env:GITHUB_ENV
          "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_RUSTFLAGS=$rfX64"      >> $env:GITHUB_ENV
          "CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_RUSTFLAGS=$rfArm64"   >> $env:GITHUB_ENV
          "CI_LIB_X64=$libX64"                                         >> $env:GITHUB_ENV
          "CI_LIB_ARM64=$libArm64"                                     >> $env:GITHUB_ENV

          # Add VS Clang to PATH so the ring crate can find it.
          $llvmBin = @(
            "$vsInstall\VC\Tools\Llvm\x64\bin",
            "$vsInstall\VC\Tools\Llvm\bin"
          ) | Where-Object { Test-Path "$_\clang.exe" } | Select-Object -First 1
          if ($llvmBin) {
            Write-Host "Clang: $llvmBin"
            "PATH=$llvmBin;$env:PATH" >> $env:GITHUB_ENV
          }

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build installers (ARM64 + x64)
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: .\build.ps1 -Target both

      # ── Package ─────────────────────────────────────────────────────────────
      - name: Generate latest.json
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $tag     = "${{ github.ref_name }}"
          $base    = "https://github.com/RFLundgren/Summit/releases/download/$tag"

          $armExe = "Summit_${version}_arm64-setup.exe"
          $x64Exe = "Summit_${version}_x64-setup.exe"

          $armSig = Get-Content "src-tauri\target\aarch64-pc-windows-msvc\release\bundle\nsis\$armExe.sig" -Raw
          $x64Sig = Get-Content "src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis\$x64Exe.sig" -Raw

          $json = [ordered]@{
            version   = $version
            notes     = "https://github.com/RFLundgren/Summit/releases/tag/$tag"
            pub_date  = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-aarch64" = [ordered]@{
                url       = "$base/$armExe"
                signature = $armSig.Trim()
              }
              "windows-x86_64" = [ordered]@{
                url       = "$base/$x64Exe"
                signature = $x64Sig.Trim()
              }
            }
          } | ConvertTo-Json -Depth 5

          $json | Set-Content "latest.json" -Encoding UTF8NoBOM
          Write-Host $json

      # ── Release ─────────────────────────────────────────────────────────────
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/Summit_*_arm64-setup.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/Summit_*_x64-setup.exe
            latest.json
